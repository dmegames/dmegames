<!DOCTYPE html>
<html>
<head>
<title>DME</title>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#202124;
  color:white;
}

/* TOPBAR */
#topbar{
  display:flex;
  gap:6px;
  padding:6px;
  background:#303134;
}

button{
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  text-align:center;
}

/* TABS */
#tabs{
  display:flex;
  background:#303134;
}

.tab{
  padding:6px 10px;
  background:#2b2c2f;
  margin-right:3px;
  cursor:pointer;
}

.tab.active{
  background:#3c4043;
}

iframe{
  width:100%;
  height:85vh;
  border:none;
  display:none;
}

iframe.active{
  display:block;
}

/* PANELS */
.panel{
  position:fixed;
  inset:0;
  background:#202124;
  z-index:999;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* THEME GRID */
.theme{
  width:80px;
  height:80px;
  margin:10px;
  display:inline-block;
  border-radius:10px;
  cursor:pointer;
}

/* animations */
@keyframes gradient{
  0%{background-position:0%}
  100%{background-position:100%}
}
</style>
</head>
<body>

<div id="topbar">
  <button onclick="openTab()">＋</button>
  <input id="urlInput" placeholder="Search or type URL">
  <button onclick="openThemes()">🎨</button>
  <button onclick="openDownloads()">⬇</button>
</div>

<div id="tabs"></div>
<div id="frames"></div>

<script>
let tabs=[], current=-1;

/* ---------------- CONFIG ---------------- */
let config = JSON.parse(localStorage.getItem("config")||"null");

if(!config){
  showSetup();
}else{
  showWhatsNew();
}

/* ---------------- SETUP ---------------- */
function showSetup(){
  document.body.innerHTML = `
  <div class="panel">
    <h1>Welcome to DME</h1>
    <p>Choose your theme</p>
    ${themeButtons(true)}
  </div>`;
}

/* ---------------- WHAT'S NEW ---------------- */
const version = "1.0.0";

function showWhatsNew(){
  let seen = localStorage.getItem("version");

  if(seen!==version){
    document.body.innerHTML += `
    <div class="panel" id="whats">
      <h2>What's New</h2>
      <p>New themes, search fix, downloads</p>
      <button onclick="closeWhats()">Continue</button>
    </div>`;
  }
}

function closeWhats(){
  document.getElementById("whats").remove();
  localStorage.setItem("version",version);
}

/* ---------------- THEMES ---------------- */
const themes={
  snow:"#0b1d3a",
  ocean:"#001f3f",
  sunset:"#ff5e62",
  neon:"#000",
  dark:"#202124"
};

function themeButtons(setup=false){
  return Object.keys(themes).map(t=>`
    <div class="theme" style="background:${themes[t]}" onclick="setTheme('${t}',${setup})"></div>
  `).join("");
}

function openThemes(){
  document.body.innerHTML += `
  <div class="panel" id="themes">
    <h2>Themes</h2>
    ${themeButtons(false)}
    <button onclick="closeThemes()">Close</button>
  </div>`;
}

function closeThemes(){
  document.getElementById("themes").remove();
}

function setTheme(t,setup){
  config = {theme:t};
  localStorage.setItem("config",JSON.stringify(config));

  if(setup){
    location.reload();
  }else{
    closeThemes();
  }
}

/* ---------------- NEW TAB ---------------- */
function createNewTab(){
  let t=config.theme;

  return `
  <body style="background:${themes[t]};display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;">

    <h1 style="font-size:80px;">DME</h1>

    <input placeholder="Search..."
      style="padding:10px;border-radius:20px;width:400px;"
      onkeydown="if(event.key==='Enter'){parent.openTab(this.value)}">

  `;
}

/* ---------------- SEARCH ---------------- */
async function search(q){
  let res = await fetch("https://duckduckgo.com/html/?q="+encodeURIComponent(q));
  return `
  <body style="background:#202124;color:white;padding:20px;">
    <h2>${q}</h2>
    <p>Click below to search</p>
    <a href="https://duckduckgo.com/?q=${encodeURIComponent(q)}" target="_blank">Open results</a>
  `;
}

/* ---------------- DOWNLOADS ---------------- */
let downloads = JSON.parse(localStorage.getItem("downloads")||"[]");

function openDownloads(){
  alert(downloads.join("\\n")||"No downloads");
}

/* ---------------- TABS ---------------- */
function isUrl(t){return t.includes(".")}

function setActive(i){
  current=i;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll("iframe").forEach(f=>f.classList.remove("active"));
  tabs[i].tab.classList.add("active");
  tabs[i].frame.classList.add("active");
}

function openTab(input){
  let raw=input||urlInput.value;

  closeThemes?.();

  let tab=document.createElement("div");
  tab.className="tab";
  tab.textContent=raw||"New Tab";

  let frame=document.createElement("iframe");

  if(!raw){
    frame.srcdoc=createNewTab();
  }
  else if(!isUrl(raw)){
    search(raw).then(html=>frame.srcdoc=html);
  }
  else{
    let url=raw.startsWith("http")?raw:"https://"+raw;
    frame.src=url;
    downloads.push(url);
    localStorage.setItem("downloads",JSON.stringify(downloads));
  }

  document.getElementById("tabs").appendChild(tab);
  document.getElementById("frames").appendChild(frame);

  let obj={tab,frame};
  tabs.push(obj);

  tab.onclick=()=>setActive(tabs.indexOf(obj));
  setActive(tabs.indexOf(obj));
}

openTab();
</script>
</body>
</html>
