<!DOCTYPE html>
<html>
<head>
  <title>DME</title>

  <style>
    :root{
      --bg:#202124;
      --top:#303134;
      --tab:#2b2c2f;
      --tab-active:#3c4043;
      --text:#e8eaed;
    }

    body{
      margin:0;
      font-family:Arial;
      background:var(--bg);
      color:var(--text);
    }

    /* TOP */
    #topbar{
      display:flex;
      align-items:center;
      padding:6px;
      background:var(--top);
      gap:6px;
    }

    button{
      background:none;
      border:none;
      color:var(--text);
      cursor:pointer;
      padding:6px;
      border-radius:6px;
    }

    button:hover{ background:#3c4043; }

    #urlInput{
      flex:1;
      padding:10px;
      border:none;
      border-radius:20px;
      background:#202124;
      color:white;
      text-align:center;
    }

    /* TABS */
    #tabs{
      display:flex;
      background:var(--top);
      padding-left:6px;
      align-items:center;
    }

    .tab{
      display:flex;
      align-items:center;
      gap:6px;
      padding:6px 12px;
      background:var(--tab);
      border-radius:12px 12px 0 0;
      margin-right:4px;
      cursor:pointer;
      max-width:160px;
    }

    .tab.active{ background:var(--tab-active); }

    .tab img{ width:16px;height:16px; }

    .close{ color:#aaa;margin-left:4px; }

    .close:hover{ color:red; }

    #newTabBtn{
      font-size:18px;
      padding:4px 10px;
    }

    /* BOOKMARKS */
    #bookmarks{
      display:flex;
      gap:10px;
      padding:5px 10px;
      background:#2a2b2e;
      overflow-x:auto;
    }

    .bookmark{
      cursor:pointer;
      padding:5px 10px;
      background:#3c4043;
      border-radius:12px;
      white-space:nowrap;
    }

    /* HISTORY PANEL */
    #historyPanel{
      position:fixed;
      right:0;
      top:0;
      width:250px;
      height:100%;
      background:#202124;
      border-left:1px solid #444;
      overflow:auto;
      display:none;
      padding:10px;
    }

    .historyItem{
      padding:6px;
      cursor:pointer;
      border-bottom:1px solid #333;
    }

    iframe{
      width:100%;
      height:85vh;
      border:none;
      display:none;
    }

    iframe.active{ display:block; }
  </style>
</head>
<body>

<div id="topbar">
  <button onclick="goBack()">←</button>
  <button onclick="goForward()">→</button>
  <button onclick="reloadTab()">⟳</button>

  <input id="urlInput" placeholder="Search DME or type URL">

  <button onclick="openTab()">➤</button>
  <button onclick="toggleHistory()">🕘</button>
</div>

<div id="tabs">
  <button id="newTabBtn" onclick="openTab()">＋</button>
</div>

<div id="bookmarks"></div>

<div id="frames"></div>

<div id="historyPanel"></div>

<script>
let tabs=[];
let current=-1;

// ⭐ bookmarks
let bookmarks = JSON.parse(localStorage.getItem("bookmarks")||"[]");

function saveBookmarks(){ localStorage.setItem("bookmarks",JSON.stringify(bookmarks)); }

function renderBookmarks(){
  let bar=document.getElementById("bookmarks");
  bar.innerHTML="";
  bookmarks.forEach(b=>{
    let el=document.createElement("div");
    el.className="bookmark";
    el.textContent=b.name;
    el.onclick=()=>openTab(b.url);
    bar.appendChild(el);
  });
}

function addBookmark(){
  let name=prompt("Name:");
  let url=urlInput.value;
  if(!name||!url) return;
  bookmarks.push({name,url});
  saveBookmarks();
  renderBookmarks();
}

// 🧾 history
let historyList = JSON.parse(localStorage.getItem("history")||"[]");

function addHistory(url){
  historyList.unshift(url);
  localStorage.setItem("history",JSON.stringify(historyList.slice(0,50)));
}

function renderHistory(){
  let panel=document.getElementById("historyPanel");
  panel.innerHTML="<h3>History</h3>";
  historyList.forEach(h=>{
    let item=document.createElement("div");
    item.className="historyItem";
    item.textContent=h;
    item.onclick=()=>openTab(h);
    panel.appendChild(item);
  });
}

function toggleHistory(){
  let panel=document.getElementById("historyPanel");
  panel.style.display = panel.style.display==="block"?"none":"block";
  renderHistory();
}

// 🧠 utils
function isUrl(t){ return t.includes(".") && !t.includes(" "); }

function createSearchPage(q){
  return `<h1 style="text-align:center;margin-top:50px;">DME: ${q}</h1>`;
}

// 🧩 tabs
function setActive(i){
  current=i;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll("iframe").forEach(f=>f.classList.remove("active"));

  tabs[i].tab.classList.add("active");
  tabs[i].frame.classList.add("active");

  urlInput.value=tabs[i].url||"";
}

function openTab(input){
  let raw=input||urlInput.value;

  const tab=document.createElement("div");
  tab.className="tab";

  const icon=document.createElement("img");
  icon.src="https://www.google.com/s2/favicons?domain="+raw;

  const title=document.createElement("span");
  title.textContent=raw||"New Tab";

  const close=document.createElement("span");
  close.textContent="✕";
  close.className="close";

  tab.append(icon,title,close);

  const frame=document.createElement("iframe");

  if(!raw){
    frame.srcdoc="<h1 style='text-align:center;'>DME</h1>";
  }
  else if(!isUrl(raw)){
    frame.srcdoc=createSearchPage(raw);
  }
  else{
    let url=raw.startsWith("http")?raw:"https://"+raw;
    frame.src=url;
    addHistory(url);
  }

  document.getElementById("tabs").appendChild(tab);
  document.getElementById("frames").appendChild(frame);

  const obj={tab,frame,url:raw};
  tabs.push(obj);

  tab.onclick=()=>setActive(tabs.indexOf(obj));

  close.onclick=(e)=>{
    e.stopPropagation();
    const i=tabs.indexOf(obj);
    tab.remove();
    frame.remove();
    tabs.splice(i,1);
    if(tabs.length) setActive(0);
  };

  setActive(tabs.indexOf(obj));
}

// nav
function goBack(){ try{tabs[current].frame.contentWindow.history.back();}catch{} }
function goForward(){ try{tabs[current].frame.contentWindow.history.forward();}catch{} }
function reloadTab(){ try{tabs[current].frame.src=tabs[current].frame.src;}catch{} }

urlInput.addEventListener("keydown",e=>{
  if(e.key==="Enter") openTab();
});

renderBookmarks();
openTab();
</script>

</body>
</html>
