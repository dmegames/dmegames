<!DOCTYPE html>
<html>
<head>
<title>DME</title>

<style>
:root{
  --bg:#202124;
  --top:#303134;
  --text:white;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* TOP */
#topbar{
  display:flex;
  gap:6px;
  padding:6px;
  background:var(--top);
}

button{
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  text-align:center;
}

/* TABS */
#tabs{
  display:flex;
  background:#303134;
}

.tab{
  padding:6px 10px;
  background:#2b2c2f;
  margin-right:3px;
  cursor:grab;
  border-radius:10px 10px 0 0;
}

.tab.active{ background:#3c4043; }

iframe{
  width:100%;
  height:85vh;
  border:none;
  display:none;
}

iframe.active{ display:block; }

/* wallpaper */
#wallpaper{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}
</style>
</head>
<body>

<img id="wallpaper">

<div id="topbar">
<button onclick="goBack()">←</button>
<button onclick="goForward()">→</button>
<button onclick="reloadTab()">⟳</button>
<input id="urlInput" placeholder="Search DME or type URL">
<button onclick="openTab()">Go</button>
<button onclick="uploadWallpaper()">🖼️</button>
</div>

<div id="tabs"></div>
<div id="frames"></div>

<script>
let tabs=[];
let current=-1;

/* 🔊 SOUND */
function clickSound(){
  let a=new Audio("https://actions.google.com/sounds/v1/ui/click.ogg");
  a.volume=0.2;
  a.play();
}

/* 🖼️ WALLPAPER */
function uploadWallpaper(){
  let input=document.createElement("input");
  input.type="file";
  input.onchange=e=>{
    let file=e.target.files[0];
    let url=URL.createObjectURL(file);
    document.getElementById("wallpaper").src=url;
    localStorage.setItem("wallpaper",url);
  };
  input.click();
}

let savedWall=localStorage.getItem("wallpaper");
if(savedWall) document.getElementById("wallpaper").src=savedWall;

/* 📌 TILES */
let defaultTiles=[
  {name:"Games",url:"https://selenium-chemistry.gtec.ar"},
  {name:"Launcher",url:"https://learning.elpsicologo.com.ar"}
];

function getTiles(){
  let t=localStorage.getItem("tiles");
  if(t) return JSON.parse(t);
  localStorage.setItem("tiles",JSON.stringify(defaultTiles));
  return defaultTiles;
}

function saveTiles(t){ localStorage.setItem("tiles",JSON.stringify(t)); }

/* 🏠 NEW TAB */
function createNewTab(){
  let tiles=getTiles();

  return `
  <body style="background:#202124;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:Arial;">
    <h1 style="font-size:80px;">DME</h1>

    <input placeholder="Search..."
      style="padding:10px;border-radius:20px;width:400px;"
      onkeydown="if(event.key==='Enter'){parent.openTab(this.value)}">

    <div style="margin-top:40px;display:grid;grid-template-columns:repeat(auto-fit,100px);gap:20px;">
      ${tiles.map((t,i)=>`
        <div style="text-align:center;">
          <div onclick="parent.openTab('${t.url}')" style="cursor:pointer;">
            <img src="https://www.google.com/s2/favicons?domain=${t.url}">
            <div>${t.name}</div>
          </div>
          <button onclick="parent.removeTile(${i})">❌</button>
        </div>
      `).join("")}
    </div>

    <button onclick="parent.addTile()" style="margin-top:20px;">Add</button>
  `;
}

/* ➕ add tile */
function addTile(){
  let name=prompt("Name:");
  let url=prompt("URL:");
  if(!name||!url) return;

  let t=getTiles();
  t.push({name,url});
  saveTiles(t);
  reloadHome();
}

/* ❌ remove tile */
function removeTile(i){
  let t=getTiles();
  t.splice(i,1);
  saveTiles(t);
  reloadHome();
}

function reloadHome(){
  tabs[current].frame.srcdoc=createNewTab();
}

/* 🔍 SEARCH */
async function createSearchPage(q){
  let res=await fetch("https://api.duckduckgo.com/?q="+encodeURIComponent(q)+"&format=json");
  let data=await res.json();

  let list=(data.RelatedTopics||[]).map(r=>`
    <div onclick="parent.openTab('${r.FirstURL}')" style="cursor:pointer;margin-bottom:10px;">
      <div style="color:#8ab4f8">${r.Text}</div>
      <div style="font-size:12px">${r.FirstURL}</div>
    </div>
  `).join("");

  return `<body style="background:#202124;color:white;padding:20px;">
    <h2>${q}</h2>${list}
  </body>`;
}

/* 🧩 TABS */
function isUrl(t){ return t.includes(".") && !t.includes(" "); }

function setActive(i){
  current=i;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll("iframe").forEach(f=>f.classList.remove("active"));
  tabs[i].tab.classList.add("active");
  tabs[i].frame.classList.add("active");
}

function openTab(input){
  clickSound();

  let raw=input||urlInput.value;

  let tab=document.createElement("div");
  tab.className="tab";
  tab.draggable=true;
  tab.textContent=raw||"New Tab";

  let frame=document.createElement("iframe");

  if(!raw){
    frame.srcdoc=createNewTab();
  }
  else if(!isUrl(raw)){
    createSearchPage(raw).then(html=>frame.srcdoc=html);
  }
  else{
    frame.src=raw.startsWith("http")?raw:"https://"+raw;
  }

  document.getElementById("tabs").appendChild(tab);
  document.getElementById("frames").appendChild(frame);

  let obj={tab,frame};
  tabs.push(obj);

  tab.onclick=()=>setActive(tabs.indexOf(obj));

  /* drag */
  tab.ondragstart=e=>{
    e.dataTransfer.setData("text/plain",tabs.indexOf(obj));
  };

  tab.ondrop=e=>{
    let from=e.dataTransfer.getData("text");
    let to=tabs.indexOf(obj);
    let t=tabs.splice(from,1)[0];
    tabs.splice(to,0,t);
    refreshTabs();
  };

  tab.ondragover=e=>e.preventDefault();

  setActive(tabs.indexOf(obj));
}

function refreshTabs(){
  let tabBar=document.getElementById("tabs");
  let frameBox=document.getElementById("frames");

  tabBar.innerHTML="";
  frameBox.innerHTML="";

  tabs.forEach(t=>{
    tabBar.appendChild(t.tab);
    frameBox.appendChild(t.frame);
  });
}

/* nav */
function goBack(){try{tabs[current].frame.contentWindow.history.back()}catch{}}
function goForward(){try{tabs[current].frame.contentWindow.history.forward()}catch{}}
function reloadTab(){try{tabs[current].frame.src=tabs[current].frame.src}catch{}}

urlInput.addEventListener("keydown",e=>{
  if(e.key==="Enter") openTab();
});

openTab();
</script>

</body>
</html>
