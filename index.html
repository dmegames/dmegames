<!DOCTYPE html>
<html>
<head>
<title>DME</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#202124;
  color:white;
}

/* TOPBAR */
#topbar{
  display:flex;
  gap:6px;
  padding:6px;
  background:#303134;
}

button{
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  text-align:center;
}

/* TABS */
#tabs{
  display:flex;
  background:#303134;
}

.tab{
  padding:6px 10px;
  background:#2b2c2f;
  margin-right:3px;
  cursor:pointer;
}

.tab.active{
  background:#3c4043;
}

iframe{
  width:100%;
  height:85vh;
  border:none;
  display:none;
}

iframe.active{
  display:block;
}

/* PANEL */
.panel{
  position:fixed;
  inset:0;
  background:#202124;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:999;
}

/* TILES */
.tile{
  width:90px;
  text-align:center;
  cursor:pointer;
}

.tile img{
  width:32px;
  height:32px;
}

/* ANIMATIONS */
@keyframes gradient{
  0%{background-position:0%}
  100%{background-position:100%}
}

@keyframes pulse{
  0%{opacity:0.7}
  100%{opacity:1}
}
</style>
</head>
<body>

<div id="topbar">
  <button onclick="openTab()">＋</button>
  <input id="urlInput" placeholder="Search or type URL">
  <button onclick="openThemes()">🎨</button>
</div>

<div id="tabs"></div>
<div id="frames"></div>

<script>
let tabs=[], current=-1;

/* CONFIG */
let config = JSON.parse(localStorage.getItem("config")||"null");
if(!config) setup();

/* SETUP */
function setup(){
  document.body.innerHTML += `
  <div class="panel">
    <h1>Welcome to DME</h1>
    <p>Select a theme</p>
    ${themeButtons(true)}
  </div>`;
}

/* THEMES */
const themes={
  dark:"#202124",
  snow:"#0b1d3a",
  ocean:"linear-gradient(270deg,#001f3f,#003f7f)",
  sunset:"linear-gradient(270deg,#ff5e62,#ff9966)",
  neon:"#000"
};

function themeButtons(first){
  return Object.keys(themes).map(t=>`
    <div class="theme" style="background:${themes[t]};width:80px;height:80px;margin:10px;border-radius:10px;cursor:pointer;"
    onclick="setTheme('${t}',${first})"></div>
  `).join("");
}

function openThemes(){
  document.body.innerHTML += `
  <div class="panel" id="themes">
    <h2>Themes</h2>
    ${themeButtons(false)}
    <button onclick="closeThemes()">Close</button>
  </div>`;
}

function closeThemes(){
  document.getElementById("themes")?.remove();
}

function setTheme(t,first){
  config={theme:t};
  localStorage.setItem("config",JSON.stringify(config));
  if(first) location.reload();
  else closeThemes();
}

/* TILES */
let tiles = JSON.parse(localStorage.getItem("tiles")||"null") || [
  {name:"Games",url:"https://selenium-chemistry.gtec.ar"},
  {name:"Launcher",url:"https://learning.elpsicologo.com.ar"}
];

function saveTiles(){
  localStorage.setItem("tiles",JSON.stringify(tiles));
}

function addTile(){
  let name=prompt("Name:");
  let url=prompt("URL:");
  if(!name||!url) return;
  tiles.push({name,url});
  saveTiles();
  reloadHome();
}

function removeTile(i){
  tiles.splice(i,1);
  saveTiles();
  reloadHome();
}

/* NEW TAB */
function createNewTab(){
  let t=config.theme;
  let bg=themes[t];
  let anim="";

  if(bg.includes("gradient")){
    anim="background-size:200% 200%;animation:gradient 6s linear infinite;";
  }

  if(t==="neon"){
    anim="animation:pulse 1s infinite alternate;";
  }

  let snow="";
  if(t==="snow"){
    snow=`
    <canvas id="snow"></canvas>
    <script>
    let c=document.getElementById("snow");
    let ctx=c.getContext("2d");
    c.width=window.innerWidth;
    c.height=window.innerHeight;
    let s=[];
    for(let i=0;i<80;i++) s.push({x:Math.random()*c.width,y:Math.random()*c.height});
    function draw(){
      ctx.clearRect(0,0,c.width,c.height);
      ctx.fillStyle="white";
      s.forEach(p=>{
        ctx.fillRect(p.x,p.y,2,2);
        p.y+=1;
        if(p.y>c.height)p.y=0;
      });
      requestAnimationFrame(draw);
    }
    draw();
    <\/script>`;
  }

  return `
  <body style="background:${bg};${anim};display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;">
    ${snow}
    <h1 style="font-size:80px;">DME</h1>

    <input placeholder="Search..."
      style="padding:10px;border-radius:20px;width:400px;"
      onkeydown="if(event.key==='Enter'){parent.openTab(this.value)}">

    <div style="margin-top:40px;display:flex;gap:20px;flex-wrap:wrap;justify-content:center;">
      ${tiles.map((t,i)=>`
        <div class="tile">
          <div onclick="parent.openTab('${t.url}')">
            <img src="https://www.google.com/s2/favicons?domain=${t.url}">
            <div>${t.name}</div>
          </div>
          <button onclick="parent.removeTile(${i})">❌</button>
        </div>
      `).join("")}
    </div>

    <button onclick="parent.addTile()" style="margin-top:20px;">Add</button>
  `;
}

/* SEARCH */
function isUrl(t){return t.includes(".")&&!t.includes(" ")}

function openTab(input){
  let raw=input||urlInput.value;
  closeThemes();

  let tab=document.createElement("div");
  tab.className="tab";
  tab.textContent=raw||"New Tab";

  let frame=document.createElement("iframe");

  if(!raw){
    frame.srcdoc=createNewTab();
  }
  else if(!isUrl(raw)){
    frame.src="https://duckduckgo.com/?q="+encodeURIComponent(raw);
  }
  else{
    let url=raw.startsWith("http")?raw:"https://"+raw;
    frame.src=url;
  }

  document.getElementById("tabs").appendChild(tab);
  document.getElementById("frames").appendChild(frame);

  let obj={tab,frame};
  tabs.push(obj);

  tab.onclick=()=>setActive(tabs.indexOf(obj));
  setActive(tabs.indexOf(obj));
}

function setActive(i){
  current=i;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll("iframe").forEach(f=>f.classList.remove("active"));
  tabs[i].tab.classList.add("active");
  tabs[i].frame.classList.add("active");
}

function reloadHome(){
  if(tabs[current]) tabs[current].frame.srcdoc=createNewTab();
}

urlInput.addEventListener("keydown",e=>{
  if(e.key==="Enter") openTab();
});

openTab();
</script>
</body>
</html>
