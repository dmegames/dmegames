<!DOCTYPE html>
<html>
<head>
<title>DME</title>

<style>
body{margin:0;font-family:Arial;background:#202124;color:white;}

/* TOPBAR */
#topbar{display:flex;gap:6px;padding:6px;background:#303134;}
button{background:none;border:none;color:white;cursor:pointer;}
input{flex:1;padding:10px;border-radius:20px;border:none;text-align:center;}

/* TABS */
#tabs{display:flex;background:#303134;}
.tab{padding:6px 10px;background:#2b2c2f;margin-right:3px;cursor:grab;}
.tab.active{background:#3c4043;}

/* FRAMES */
#frames{display:flex;}
iframe{width:100%;height:85vh;border:none;display:none;}
iframe.active{display:block;}
iframe.split{width:50%!important;display:block!important;}

/* HISTORY */
#historyPanel{
  position:fixed;
  right:0;
  top:0;
  width:250px;
  height:100%;
  background:#202124;
  border-left:1px solid #444;
  display:none;
  padding:10px;
  overflow:auto;
}

.historyItem{
  padding:6px;
  border-bottom:1px solid #333;
  cursor:pointer;
}
</style>
</head>
<body>

<div id="topbar">
  <button onclick="openTab()">＋</button>
  <input id="urlInput" placeholder="Search or type URL">
  <button onclick="toggleHistory()">🕘</button>
  <button onclick="toggleSplit()">🪟</button>
</div>

<div id="tabs"></div>
<div id="frames"></div>

<div id="historyPanel">
  <h3>History <button onclick="toggleHistory()">✕</button></h3>
  <div id="historyList"></div>
</div>

<script>
let tabs=[], current=-1;
let split=false;

/* HISTORY */
let historyData=JSON.parse(localStorage.getItem("history")||"[]");

function addHistory(url){
  historyData.unshift(url);
  localStorage.setItem("history",JSON.stringify(historyData.slice(0,50)));
}

function renderHistory(){
  let box=document.getElementById("historyList");
  box.innerHTML="";
  historyData.forEach(h=>{
    let d=document.createElement("div");
    d.className="historyItem";
    d.textContent=h;
    d.onclick=()=>openTab(h);
    box.appendChild(d);
  });
}

function toggleHistory(){
  let p=document.getElementById("historyPanel");
  if(p.style.display==="block") p.style.display="none";
  else{
    p.style.display="block";
    renderHistory();
  }
}

/* SPLIT */
function toggleSplit(){
  split=!split;
  document.querySelectorAll("iframe").forEach(f=>{
    if(split) f.classList.add("split");
    else f.classList.remove("split");
  });
}

/* SEARCH PAGE */
function searchPage(q){
  return `
  <body style="background:#202124;color:white;padding:20px;">
    <h2>Results for "${q}"</h2>

    <div onclick="parent.openTab('https://duckduckgo.com/?q=${encodeURIComponent(q)}')" 
         style="cursor:pointer;color:#8ab4f8;margin-top:10px;">
      Search on DuckDuckGo
    </div>

    <div onclick="parent.openTab('https://www.youtube.com/results?search_query=${encodeURIComponent(q)}')" 
         style="cursor:pointer;color:#8ab4f8;margin-top:10px;">
      Search on YouTube
    </div>

    <div onclick="parent.openTab('https://en.wikipedia.org/wiki/Special:Search?search=${encodeURIComponent(q)}')" 
         style="cursor:pointer;color:#8ab4f8;margin-top:10px;">
      Search on Wikipedia
    </div>
  `;
}

/* TABS */
function isUrl(t){return t.includes(".")&&!t.includes(" ");}

function setActive(i){
  current=i;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll("iframe").forEach(f=>f.classList.remove("active"));
  tabs[i].tab.classList.add("active");
  tabs[i].frame.classList.add("active");
}

function openTab(input){
  let raw=input||urlInput.value;

  let tab=document.createElement("div");
  tab.className="tab";
  tab.draggable=true;
  tab.textContent=raw||"New Tab";

  let frame=document.createElement("iframe");

  if(!raw){
    frame.srcdoc="<h1 style='text-align:center;margin-top:40vh;'>New Tab</h1>";
  }
  else if(!isUrl(raw)){
    frame.srcdoc=searchPage(raw);
  }
  else{
    let url=raw.startsWith("http")?raw:"https://"+raw;
    frame.src=url;
    addHistory(url);
  }

  document.getElementById("tabs").appendChild(tab);
  document.getElementById("frames").appendChild(frame);

  let obj={tab,frame};
  tabs.push(obj);

  tab.onclick=()=>setActive(tabs.indexOf(obj));

  /* DRAG */
  tab.ondragstart=e=>{
    e.dataTransfer.setData("i",tabs.indexOf(obj));
  };

  tab.ondrop=e=>{
    let from=e.dataTransfer.getData("i");
    let to=tabs.indexOf(obj);
    let t=tabs.splice(from,1)[0];
    tabs.splice(to,0,t);
    refreshTabs();
  };

  tab.ondragover=e=>e.preventDefault();

  setActive(tabs.indexOf(obj));
}

function refreshTabs(){
  let t=document.getElementById("tabs");
  let f=document.getElementById("frames");
  t.innerHTML="";
  f.innerHTML="";
  tabs.forEach(x=>{
    t.appendChild(x.tab);
    f.appendChild(x.frame);
  });
}

/* ENTER */
urlInput.addEventListener("keydown",e=>{
  if(e.key==="Enter") openTab();
});

openTab();
</script>
</body>
</html>
