<script>
function openTab(urlParam) {
  let raw = urlParam || urlInput.value;
  if (!raw) return;

  let url = buildUrl(raw);

  const tab = document.createElement("div");
  tab.className = "tab";

  const title = document.createElement("span");
  title.textContent = "Loading...";

  const close = document.createElement("span");
  close.textContent = "✕";
  close.className = "close";

  tab.append(title, close);

  const frame = document.createElement("iframe");
  frame.src = url;

  document.getElementById("tabs").appendChild(tab);
  document.getElementById("frames").appendChild(frame);

  tabs.push({ tab, frame, url });

  const index = tabs.length - 1;

  tab.onclick = () => setActive(index);

  close.onclick = (e) => {
    e.stopPropagation();
    tab.remove();
    frame.remove();
    tabs.splice(index, 1);
    if (tabs.length) setActive(0);
  };

  let loaded = false;

  frame.onload = () => {
    loaded = true;
    title.textContent = url;
  };

  // ⏳ if it doesn’t load → open outside
  setTimeout(() => {
    if (!loaded) {
      window.open(url, "_blank");
      title.textContent = "Opened externally";
    }
  }, 3000);

  setActive(index);
}
</script>
