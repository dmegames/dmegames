<!DOCTYPE html>
<html>
<head>
<title>DME</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#202124;
  color:white;
}

/* TOPBAR */
#topbar{
  display:flex;
  gap:6px;
  padding:6px;
  background:#303134;
}

button{
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  text-align:center;
}

/* TABS */
#tabs{
  display:flex;
  background:#303134;
}

.tab{
  padding:6px 10px;
  background:#2b2c2f;
  margin-right:3px;
  cursor:pointer;
}

.tab.active{
  background:#3c4043;
}

iframe{
  width:100%;
  height:85vh;
  border:none;
  display:none;
}

iframe.active{
  display:block;
}

/* THEME PANEL */
#themePanel{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#202124;
  padding:10px;
  border-radius:10px;
  display:none;
  gap:10px;
}

.theme{
  width:60px;
  height:60px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>
<body>

<div id="topbar">
  <button onclick="openTab()">＋</button>
  <input id="urlInput" placeholder="Search or type URL">
  <button onclick="toggleThemes()">🎨</button>
</div>

<div id="tabs"></div>
<div id="frames"></div>

<div id="themePanel"></div>

<script>
let tabs=[], current=-1;

/* ---------------- THEMES ---------------- */

const themes={
  dark:"#202124",
  ocean:"#0b1d3a",
  sunset:"#3a0b1d",
  neon:"#000",
  snow:"#0b1d3a"
};

let currentTheme = localStorage.getItem("theme") || "dark";

function toggleThemes(){
  let panel=document.getElementById("themePanel");
  panel.style.display = panel.style.display==="flex"?"none":"flex";
}

function renderThemes(){
  let panel=document.getElementById("themePanel");
  panel.innerHTML="";
  panel.style.display="flex";

  Object.keys(themes).forEach(t=>{
    let div=document.createElement("div");
    div.className="theme";
    div.style.background=themes[t];
    div.onclick=()=>{
      currentTheme=t;
      localStorage.setItem("theme",t);
      reloadHome();
    };
    panel.appendChild(div);
  });
}

renderThemes();

/* ---------------- NEW TAB ---------------- */

function createNewTab(){
  return `
  <body style="
    background:${themes[currentTheme]};
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    color:white;
  ">
    <h1 style="font-size:80px;">DME</h1>

    <input placeholder="Search..."
      style="padding:10px;border-radius:20px;width:400px;"
      onkeydown="if(event.key==='Enter'){parent.openTab(this.value)}">
  `;
}

/* ---------------- SEARCH ---------------- */

function searchPage(q){
  return `
  <body style="background:#202124;color:white;padding:20px;">
    <h2>${q}</h2>

    <div onclick="parent.openTab('https://duckduckgo.com/?q=${encodeURIComponent(q)}')" 
         style="cursor:pointer;color:#8ab4f8;">
      Search "${q}" on DuckDuckGo
    </div>
  `;
}

/* ---------------- TABS ---------------- */

function isUrl(t){
  return t.includes(".") && !t.includes(" ");
}

function setActive(i){
  current=i;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll("iframe").forEach(f=>f.classList.remove("active"));

  tabs[i].tab.classList.add("active");
  tabs[i].frame.classList.add("active");
}

function openTab(input){
  let raw=input||urlInput.value;

  document.getElementById("themePanel").style.display="none";

  let tab=document.createElement("div");
  tab.className="tab";
  tab.textContent=raw||"New Tab";

  let frame=document.createElement("iframe");

  if(!raw){
    frame.srcdoc=createNewTab();
  }
  else if(!isUrl(raw)){
    frame.srcdoc=searchPage(raw);
  }
  else{
    let url=raw.startsWith("http")?raw:"https://"+raw;
    frame.src=url;
  }

  document.getElementById("tabs").appendChild(tab);
  document.getElementById("frames").appendChild(frame);

  let obj={tab,frame};
  tabs.push(obj);

  tab.onclick=()=>setActive(tabs.indexOf(obj));

  setActive(tabs.indexOf(obj));
}

function reloadHome(){
  if(tabs[current]){
    tabs[current].frame.srcdoc=createNewTab();
  }
}

urlInput.addEventListener("keydown",e=>{
  if(e.key==="Enter") openTab();
});

openTab();
</script>

</body>
</html>
