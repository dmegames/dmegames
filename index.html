<!DOCTYPE html>
<html>
<head>
<title>DME</title>

<style>
:root{
  --bg:#202124;
  --top:#303134;
  --text:white;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* TOPBAR */
#topbar{
  display:flex;
  gap:6px;
  padding:6px;
  background:var(--top);
}

button{
  background:none;
  border:none;
  color:white;
  cursor:pointer;
  padding:6px;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  text-align:center;
}

/* TABS */
#tabs{
  display:flex;
  background:#303134;
}

.tab{
  padding:6px 10px;
  background:#2b2c2f;
  margin-right:3px;
  cursor:pointer;
  border-radius:10px 10px 0 0;
}

.tab.active{
  background:#3c4043;
}

/* FRAMES */
iframe{
  width:100%;
  height:85vh;
  border:none;
  display:none;
}

iframe.active{
  display:block;
}

/* HISTORY */
#historyPanel{
  position:fixed;
  right:0;
  top:0;
  width:260px;
  height:100%;
  background:#202124;
  border-left:1px solid #444;
  display:none;
  padding:10px;
  overflow:auto;
  z-index:999;
}

.historyItem{
  padding:6px;
  cursor:pointer;
  border-bottom:1px solid #333;
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <button onclick="goBack()">←</button>
  <button onclick="goForward()">→</button>
  <button onclick="reloadTab()">⟳</button>

  <button onclick="openTab()">＋</button>

  <input id="urlInput" placeholder="Search DME or type URL">

  <button onclick="toggleHistory()">🕘</button>
  <button onclick="cycleTheme()">🎨</button>
</div>

<!-- TABS -->
<div id="tabs"></div>

<!-- FRAMES -->
<div id="frames"></div>

<!-- HISTORY PANEL -->
<div id="historyPanel">
  <div style="display:flex;justify-content:space-between;">
    <h3>History</h3>
    <button onclick="toggleHistory()">✕</button>
  </div>
  <div id="historyList"></div>
</div>

<script>
let tabs=[];
let current=-1;

/* ---------------- THEMES ---------------- */

const themes = ["dark","ocean","sunset","neon","snow"];
let themeIndex = 0;

function applyTheme(){
  let t = themes[themeIndex];

  if(t==="dark") document.body.style.background="#202124";
  if(t==="ocean") document.body.style.background="#0b1d3a";
  if(t==="sunset") document.body.style.background="#3a0b1d";
  if(t==="neon") document.body.style.background="#000";
  if(t==="snow") document.body.style.background="#0b1d3a";
}

function cycleTheme(){
  themeIndex++;
  if(themeIndex >= themes.length) themeIndex = 0;
  applyTheme();
}

applyTheme();

/* ---------------- HISTORY ---------------- */

let historyList = JSON.parse(localStorage.getItem("history") || "[]");

function addHistory(url){
  historyList.unshift(url);
  localStorage.setItem("history", JSON.stringify(historyList.slice(0,50)));
}

function renderHistory(){
  let box = document.getElementById("historyList");
  box.innerHTML = "";

  historyList.forEach(h=>{
    let div = document.createElement("div");
    div.className = "historyItem";
    div.textContent = h;
    div.onclick = ()=>openTab(h);
    box.appendChild(div);
  });
}

function toggleHistory(){
  let panel = document.getElementById("historyPanel");

  if(panel.style.display === "block"){
    panel.style.display = "none";
  } else {
    panel.style.display = "block";
    renderHistory();
  }
}

/* ---------------- PINNED ---------------- */

let tiles = [
  {name:"Games",url:"https://selenium-chemistry.gtec.ar"},
  {name:"Launcher",url:"https://learning.elpsicologo.com.ar"}
];

function createNewTab(){
  return `
  <body style="background:#202124;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;">
    <h1 style="font-size:80px;">DME</h1>

    <input placeholder="Search..."
      style="padding:10px;border-radius:20px;width:400px;"
      onkeydown="if(event.key==='Enter'){parent.openTab(this.value)}">

    <div style="margin-top:40px;display:flex;gap:20px;">
      ${tiles.map(t=>`
        <div onclick="parent.openTab('${t.url}')" style="cursor:pointer;text-align:center;">
          <img src="https://www.google.com/s2/favicons?domain=${t.url}">
          <div>${t.name}</div>
        </div>
      `).join("")}
    </div>
  `;
}

/* ---------------- SEARCH ---------------- */

async function createSearchPage(q){
  let res = await fetch("https://api.duckduckgo.com/?q="+encodeURIComponent(q)+"&format=json");
  let data = await res.json();

  let list = (data.RelatedTopics||[]).map(r=>`
    <div onclick="parent.openTab('${r.FirstURL}')" style="cursor:pointer;margin-bottom:10px;">
      <div style="color:#8ab4f8">${r.Text}</div>
      <div style="font-size:12px">${r.FirstURL}</div>
    </div>
  `).join("");

  return `<body style="background:#202124;color:white;padding:20px;">
    <h2>${q}</h2>${list}
  </body>`;
}

/* ---------------- TABS ---------------- */

function isUrl(t){
  return t.includes(".") && !t.includes(" ");
}

function setActive(i){
  current = i;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll("iframe").forEach(f=>f.classList.remove("active"));

  tabs[i].tab.classList.add("active");
  tabs[i].frame.classList.add("active");
}

function openTab(input){
  let raw = input || urlInput.value;

  let tab = document.createElement("div");
  tab.className = "tab";
  tab.textContent = raw || "New Tab";

  let frame = document.createElement("iframe");

  if(!raw){
    frame.srcdoc = createNewTab();
  }
  else if(!isUrl(raw)){
    createSearchPage(raw).then(html=>{
      frame.srcdoc = html;
    });
  }
  else{
    let url = raw.startsWith("http") ? raw : "https://" + raw;
    frame.src = url;
    addHistory(url);
  }

  document.getElementById("tabs").appendChild(tab);
  document.getElementById("frames").appendChild(frame);

  let obj = {tab, frame};
  tabs.push(obj);

  tab.onclick = ()=>setActive(tabs.indexOf(obj));

  setActive(tabs.indexOf(obj));
}

/* NAV */
function goBack(){ try{tabs[current].frame.contentWindow.history.back()}catch{} }
function goForward(){ try{tabs[current].frame.contentWindow.history.forward()}catch{} }
function reloadTab(){ try{tabs[current].frame.src=tabs[current].frame.src}catch{} }

urlInput.addEventListener("keydown", e=>{
  if(e.key==="Enter") openTab();
});

openTab();
</script>

</body>
</html>
