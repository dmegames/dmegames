<!DOCTYPE html>
<html>
<head>
  <title>DME Browser</title>
  <style>
    body { margin:0; font-family:Arial; background:#202124; color:white; }

    #topbar {
      display:flex;
      padding:5px;
      background:#303134;
      gap:5px;
    }

    input {
      flex:1;
      padding:8px;
      border:none;
      outline:none;
      border-radius:20px;
    }

    button {
      padding:8px;
      border:none;
      background:#3c4043;
      color:white;
      cursor:pointer;
      border-radius:6px;
    }

    #tabs {
      display:flex;
      background:#202124;
      overflow-x:auto;
    }

    .tab {
      padding:6px 10px;
      background:#303134;
      margin-right:2px;
      cursor:pointer;
      display:flex;
      gap:6px;
      align-items:center;
    }

    .tab.active { background:#5f6368; }

    .close { color:red; cursor:pointer; }

    iframe {
      width:100%;
      height:85vh;
      border:none;
      display:none;
      background:white;
    }

    iframe.active { display:block; }
  </style>
</head>
<body>

<div id="topbar">
  <button onclick="goBack()">←</button>
  <button onclick="goForward()">→</button>
  <button onclick="reloadTab()">⟳</button>
  <input id="urlInput" placeholder="Search with DME or enter URL">
  <button onclick="openTab()">Go</button>
</div>

<div id="tabs"></div>
<div id="frames"></div>

<script>
let tabs = [];
let current = -1;

function isUrl(text){
  return text.includes(".") && !text.includes(" ");
}

// 🏠 HOMEPAGE
function createHomePage(){
  return `
  <html>
  <body style="margin:0;font-family:Arial;background:#202124;color:white;text-align:center;">
    <h1 style="margin-top:40px;">DME</h1>

    <div style="margin-top:40px; display:grid; grid-template-columns:repeat(auto-fit,120px); gap:20px; justify-content:center;">
      
      ${tile("YouTube","https://youtube.com")}
      ${tile("GitHub","https://github.com")}
      ${tile("Wikipedia","https://wikipedia.org")}
      ${tile("Roblox","https://roblox.com")}
      ${tile("Google","https://google.com")}
      
    </div>
  </body>
  </html>
  `;
}

function tile(name,url){
  return `
    <div onclick="parent.openTab('${url}')" 
      style="background:#303134;padding:20px;border-radius:10px;cursor:pointer;">
      ${name}
    </div>
  `;
}

// 🔍 SEARCH PAGE
function createSearchPage(query){
  return `
    <html>
    <body style="font-family:Arial;background:#202124;color:white;text-align:center;padding-top:50px;">
      <h1>DME Search</h1>
      <h2>${query}</h2>
      <button onclick="window.open('https://www.bing.com/search?q=${encodeURIComponent(query)}','_blank')">
        Open results
      </button>
    </body>
    </html>
  `;
}

function setActive(i){
  current = i;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll("iframe").forEach(f=>f.classList.remove("active"));

  tabs[i].tab.classList.add("active");
  tabs[i].frame.classList.add("active");

  urlInput.value = tabs[i].url;
}

function openTab(input){
  let raw = input || urlInput.value;

  const tab = document.createElement("div");
  tab.className="tab";

  const title = document.createElement("span");
  title.textContent = raw || "New Tab";

  const close = document.createElement("span");
  close.textContent="✕";
  close.className="close";

  tab.append(title,close);

  const frame = document.createElement("iframe");

  // 🏠 EMPTY = HOMEPAGE
  if(!raw){
    frame.srcdoc = createHomePage();
  }
  // 🔍 SEARCH
  else if(!isUrl(raw)){
    frame.srcdoc = createSearchPage(raw);
  }
  // 🌐 WEBSITE
  else{
    let url = raw.startsWith("http") ? raw : "https://" + raw;
    frame.src = url;

    setTimeout(()=>{
      try{
        if(!frame.contentWindow || frame.contentWindow.length === 0){
          frame.srcdoc = `
            <html><body style="text-align:center;padding-top:50px;">
            <h2>Site blocked</h2>
            <button onclick="window.open('${url}','_blank')">Open</button>
            </body></html>
          `;
        }
      }catch{}
    },2000);
  }

  document.getElementById("tabs").appendChild(tab);
  document.getElementById("frames").appendChild(frame);

  const obj = {tab,frame,url:raw};
  tabs.push(obj);

  tab.onclick=()=>setActive(tabs.indexOf(obj));

  close.onclick=(e)=>{
    e.stopPropagation();
    const i=tabs.indexOf(obj);
    tab.remove();
    frame.remove();
    tabs.splice(i,1);
    if(tabs.length) setActive(0);
  };

  setActive(tabs.indexOf(obj));
}

// open first tab as homepage
openTab();

function goBack(){ try{tabs[current].frame.contentWindow.history.back();}catch{} }
function goForward(){ try{tabs[current].frame.contentWindow.history.forward();}catch{} }
function reloadTab(){ try{tabs[current].frame.src = tabs[current].frame.src;}catch{} }

urlInput.addEventListener("keydown",e=>{
  if(e.key==="Enter") openTab();
});
</script>

</body>
</html>
