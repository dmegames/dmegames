<!DOCTYPE html>
<html>
<head>
  <title>DME Browser</title>
  <style>
    body { margin:0; font-family:Arial; background:#202124; color:white; }

    #topbar {
      display:flex;
      padding:5px;
      background:#303134;
      gap:5px;
    }

    input {
      flex:1;
      padding:8px;
      border:none;
      outline:none;
      border-radius:20px;
    }

    button {
      padding:8px;
      border:none;
      background:#3c4043;
      color:white;
      cursor:pointer;
      border-radius:6px;
    }

    #tabs {
      display:flex;
      background:#202124;
      overflow-x:auto;
    }

    .tab {
      padding:6px 10px;
      background:#303134;
      margin-right:2px;
      cursor:pointer;
      display:flex;
      gap:6px;
      align-items:center;
    }

    .tab.active { background:#5f6368; }

    .close { color:red; cursor:pointer; }

    iframe {
      width:100%;
      height:85vh;
      border:none;
      display:none;
      background:white;
    }

    iframe.active { display:block; }
  </style>
</head>
<body>

<div id="topbar">
  <button onclick="goBack()">←</button>
  <button onclick="goForward()">→</button>
  <button onclick="reloadTab()">⟳</button>
  <input id="urlInput" placeholder="Search with DME or enter URL">
  <button onclick="openTab()">Go</button>
</div>

<div id="tabs"></div>
<div id="frames"></div>

<script>
let tabs = [];
let current = -1;

function isUrl(text){
  return text.includes(".") && !text.includes(" ");
}

// 🧠 DME SEARCH PAGE (internal, no blocking)
function createSearchPage(query){
  return `
    <html>
    <body style="font-family:Arial;background:#202124;color:white;text-align:center;padding-top:50px;">
      <h1>DME Search</h1>
      <p>You searched for:</p>
      <h2>${query}</h2>
      <br>
      <button onclick="window.open('https://www.bing.com/search?q=${encodeURIComponent(query)}','_blank')">
        Open results
      </button>
    </body>
    </html>
  `;
}

function setActive(i){
  current = i;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll("iframe").forEach(f=>f.classList.remove("active"));

  tabs[i].tab.classList.add("active");
  tabs[i].frame.classList.add("active");

  urlInput.value = tabs[i].url;
}

function openTab(){
  let raw = urlInput.value.trim();
  if(!raw) return;

  const tab = document.createElement("div");
  tab.className="tab";

  const title = document.createElement("span");
  title.textContent = raw;

  const close = document.createElement("span");
  close.textContent="✕";
  close.className="close";

  tab.append(title,close);

  const frame = document.createElement("iframe");

  // 🔍 SEARCH MODE (internal page)
  if(!isUrl(raw)){
    frame.srcdoc = createSearchPage(raw);
  } else {
    let url = raw.startsWith("http") ? raw : "https://" + raw;
    frame.src = url;

    // fallback if blocked
    setTimeout(()=>{
      try{
        if(!frame.contentWindow || frame.contentWindow.length === 0){
          frame.srcdoc = `
            <html><body style="font-family:Arial;text-align:center;padding-top:50px;">
            <h2>Site blocked from embedding</h2>
            <button onclick="window.open('${url}','_blank')">
              Open normally
            </button>
            </body></html>
          `;
        }
      }catch{}
    },2000);
  }

  document.getElementById("tabs").appendChild(tab);
  document.getElementById("frames").appendChild(frame);

  const obj = {tab,frame,url:raw};
  tabs.push(obj);

  tab.onclick=()=>setActive(tabs.indexOf(obj));

  close.onclick=(e)=>{
    e.stopPropagation();
    const i=tabs.indexOf(obj);
    tab.remove();
    frame.remove();
    tabs.splice(i,1);
    if(tabs.length) setActive(0);
  };

  setActive(tabs.indexOf(obj));
}

function goBack(){
  try{ tabs[current].frame.contentWindow.history.back(); }catch{}
}

function goForward(){
  try{ tabs[current].frame.contentWindow.history.forward(); }catch{}
}

function reloadTab(){
  try{ tabs[current].frame.src = tabs[current].frame.src; }catch{}
}

urlInput.addEventListener("keydown",e=>{
  if(e.key==="Enter") openTab();
});
</script>

</body>
</html>
