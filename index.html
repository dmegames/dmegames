<!DOCTYPE html>
<html>
<head>
<title>DME</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#202124;
  color:white;
}

/* TOPBAR */
#topbar{
  display:flex;
  gap:6px;
  padding:6px;
  background:#303134;
}

button{
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  text-align:center;
}

/* TABS */
#tabs{
  display:flex;
  background:#303134;
}

.tab{
  padding:6px 10px;
  background:#2b2c2f;
  margin-right:3px;
  cursor:pointer;
}

.tab.active{
  background:#3c4043;
}

/* FRAME */
iframe{
  width:100%;
  height:85vh;
  border:none;
  display:none;
}

iframe.active{
  display:block;
}

/* THEME PANEL */
#themePanel{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#202124;
  padding:15px;
  border-radius:10px;
  display:none;
  gap:10px;
}

.theme{
  width:60px;
  height:60px;
  border-radius:8px;
  cursor:pointer;
  border:2px solid #555;
}
</style>
</head>
<body>

<div id="topbar">
  <button onclick="openTab()">＋</button>
  <input id="urlInput" placeholder="Search DME or type URL">
  <button onclick="toggleThemes()">🎨</button>
</div>

<div id="tabs"></div>
<div id="frames"></div>

<div id="themePanel"></div>

<script>
let tabs=[];
let current=-1;

/* ---------------- THEMES ---------------- */

const themes = [
  {name:"snow", color:"#0b1d3a"},
  {name:"dark", color:"#202124"},
  {name:"ocean", color:"#0b1d3a"},
  {name:"sunset", color:"#3a0b1d"},
  {name:"neon", color:"#000"}
];

let currentTheme = localStorage.getItem("theme") || "dark";

function toggleThemes(){
  let panel=document.getElementById("themePanel");
  panel.style.display = panel.style.display==="flex" ? "none" : "flex";
}

function renderThemes(){
  let panel=document.getElementById("themePanel");
  panel.innerHTML="";
  panel.style.display="flex";

  themes.forEach(t=>{
    let div=document.createElement("div");
    div.className="theme";
    div.style.background=t.color;

    div.onclick=()=>{
      currentTheme=t.name;
      localStorage.setItem("theme",t.name);
      reloadHome();
    };

    panel.appendChild(div);
  });
}

renderThemes();

/* ---------------- NEW TAB ---------------- */

function createNewTab(){
  let theme = currentTheme;

  let animation = "";

  if(theme==="snow"){
    animation = `
      <canvas id="snow"></canvas>
      <script>
        let c=document.getElementById("snow");
        let ctx=c.getContext("2d");
        c.width=window.innerWidth;
        c.height=window.innerHeight;

        let snow=[];
        for(let i=0;i<100;i++){
          snow.push({x:Math.random()*c.width,y:Math.random()*c.height});
        }

        function draw(){
          ctx.clearRect(0,0,c.width,c.height);
          ctx.fillStyle="white";
          snow.forEach(s=>{
            ctx.fillRect(s.x,s.y,2,2);
            s.y+=1;
            if(s.y>c.height)s.y=0;
          });
          requestAnimationFrame(draw);
        }
        draw();
      <\/script>
    `;
  }

  return `
  <body style="
    background:${themes.find(t=>t.name===theme).color};
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
  ">

    ${animation}

    <h1 style="font-size:80px;">DME</h1>

    <input placeholder="Search..."
      style="padding:10px;border-radius:20px;width:400px;"
      onkeydown="if(event.key==='Enter'){parent.openTab(this.value)}">

  `;
}

/* ---------------- SEARCH ---------------- */

async function createSearchPage(q){
  let res = await fetch("https://api.duckduckgo.com/?q="+encodeURIComponent(q)+"&format=json&no_html=1");
  let data = await res.json();

  let results = (data.RelatedTopics || []).slice(0,10).map(r=>{
    if(!r.Text) return "";
    return `
      <div onclick="parent.openTab('${r.FirstURL}')" style="cursor:pointer;margin-bottom:15px;">
        <div style="color:#8ab4f8">${r.Text}</div>
        <div style="font-size:12px">${r.FirstURL}</div>
      </div>
    `;
  }).join("");

  return `
  <body style="background:#202124;color:white;padding:20px;">
    <h2>${q}</h2>
    ${results || "No results"}
  </body>
  `;
}

/* ---------------- TABS ---------------- */

function isUrl(t){
  return t.includes(".") && !t.includes(" ");
}

function setActive(i){
  current=i;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll("iframe").forEach(f=>f.classList.remove("active"));

  tabs[i].tab.classList.add("active");
  tabs[i].frame.classList.add("active");
}

function openTab(input){
  let raw=input||urlInput.value;

  let tab=document.createElement("div");
  tab.className="tab";
  tab.textContent=raw||"New Tab";

  let frame=document.createElement("iframe");

  if(!raw){
    frame.srcdoc=createNewTab();
  }
  else if(!isUrl(raw)){
    createSearchPage(raw).then(html=>{
      frame.srcdoc=html;
    });
  }
  else{
    frame.src=raw.startsWith("http")?raw:"https://"+raw;
  }

  document.getElementById("tabs").appendChild(tab);
  document.getElementById("frames").appendChild(frame);

  let obj={tab,frame};
  tabs.push(obj);

  tab.onclick=()=>setActive(tabs.indexOf(obj));

  setActive(tabs.indexOf(obj));
}

/* reload homepage */
function reloadHome(){
  if(tabs[current]){
    tabs[current].frame.srcdoc=createNewTab();
  }
}

urlInput.addEventListener("keydown",e=>{
  if(e.key==="Enter") openTab();
});

openTab();
</script>

</body>
</html>
