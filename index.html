<!DOCTYPE html>
<html>
<head>
<title>DME</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#202124;
  color:white;
}

/* TOPBAR */
#topbar{
  display:flex;
  gap:6px;
  padding:6px;
  background:#303134;
}

button{
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  text-align:center;
}

/* TABS */
#tabs{
  display:flex;
  background:#303134;
}

.tab{
  padding:6px 10px;
  background:#2b2c2f;
  margin-right:3px;
  cursor:pointer;
}

.tab.active{
  background:#3c4043;
}

iframe{
  width:100%;
  height:85vh;
  border:none;
  display:none;
}

iframe.active{
  display:block;
}

/* PANEL */
.panel{
  position:fixed;
  inset:0;
  background:#202124;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:999;
}

/* THEMES */
.theme{
  width:80px;
  height:80px;
  margin:10px;
  border-radius:10px;
  cursor:pointer;
}

/* ANIMATIONS */
@keyframes gradient{
  0%{background-position:0%}
  100%{background-position:100%}
}

@keyframes pulse{
  0%{opacity:0.7}
  100%{opacity:1}
}
</style>
</head>
<body>

<div id="topbar">
  <button onclick="openTab()">＋</button>
  <input id="urlInput" placeholder="Search or type URL">
  <button onclick="openThemes()">🎨</button>
</div>

<div id="tabs"></div>
<div id="frames"></div>

<script>
let tabs=[], current=-1;

/* ---------------- CONFIG ---------------- */
let config = JSON.parse(localStorage.getItem("config")||"null");

if(!config){
  setup();
}

/* ---------------- SETUP ---------------- */
function setup(){
  document.body.innerHTML += `
  <div class="panel">
    <h1>Welcome to DME</h1>
    <p>Select a theme</p>
    ${themeButtons(true)}
  </div>`;
}

/* ---------------- THEMES ---------------- */

const themes={
  dark:"#202124",
  snow:"#0b1d3a",
  ocean:"#001f3f",
  sunset:"linear-gradient(270deg,#ff5e62,#ff9966)",
  neon:"#000"
};

function themeButtons(first){
  return Object.keys(themes).map(t=>`
    <div class="theme" style="background:${themes[t]}"
      onclick="setTheme('${t}',${first})"></div>
  `).join("");
}

function openThemes(){
  document.body.innerHTML += `
  <div class="panel" id="themes">
    <h2>Themes</h2>
    ${themeButtons(false)}
    <button onclick="closeThemes()">Close</button>
  </div>`;
}

function closeThemes(){
  document.getElementById("themes")?.remove();
}

function setTheme(t,first){
  config={theme:t};
  localStorage.setItem("config",JSON.stringify(config));

  if(first) location.reload();
  else closeThemes();
}

/* ---------------- NEW TAB ---------------- */

function createNewTab(){
  let t=config.theme;
  let bg=themes[t];

  let extra="";

  if(t==="snow"){
    extra=`
    <canvas id="snow"></canvas>
    <script>
      let c=document.getElementById("snow");
      let ctx=c.getContext("2d");
      c.width=window.innerWidth;
      c.height=window.innerHeight;

      let snow=[];
      for(let i=0;i<80;i++){
        snow.push({x:Math.random()*c.width,y:Math.random()*c.height});
      }

      function draw(){
        ctx.clearRect(0,0,c.width,c.height);
        ctx.fillStyle="white";
        snow.forEach(s=>{
          ctx.fillRect(s.x,s.y,2,2);
          s.y+=1;
          if(s.y>c.height)s.y=0;
        });
        requestAnimationFrame(draw);
      }
      draw();
    <\/script>`;
  }

  if(t==="sunset"){
    extra=`style="background-size:200% 200%;animation:gradient 5s linear infinite;"`;
  }

  if(t==="neon"){
    extra=`style="animation:pulse 1s infinite alternate;"`;
  }

  return `
  <body style="background:${bg};display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;" ${extra}>
    ${extra.includes("canvas")?extra:""}
    <h1 style="font-size:80px;">DME</h1>

    <input placeholder="Search..."
      style="padding:10px;border-radius:20px;width:400px;"
      onkeydown="if(event.key==='Enter'){parent.openTab(this.value)}">
  `;
}

/* ---------------- SEARCH ---------------- */

function isUrl(t){
  return t.includes(".") && !t.includes(" ");
}

function openTab(input){
  let raw=input||urlInput.value;

  closeThemes();

  let tab=document.createElement("div");
  tab.className="tab";
  tab.textContent=raw||"New Tab";

  let frame=document.createElement("iframe");

  if(!raw){
    frame.srcdoc=createNewTab();
  }
  else if(!isUrl(raw)){
    // clean search (REAL working)
    frame.src="https://duckduckgo.com/?q="+encodeURIComponent(raw);
  }
  else{
    let url=raw.startsWith("http")?raw:"https://"+raw;
    frame.src=url;
  }

  document.getElementById("tabs").appendChild(tab);
  document.getElementById("frames").appendChild(frame);

  let obj={tab,frame};
  tabs.push(obj);

  tab.onclick=()=>setActive(tabs.indexOf(obj));
  setActive(tabs.indexOf(obj));
}

function setActive(i){
  current=i;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll("iframe").forEach(f=>f.classList.remove("active"));
  tabs[i].tab.classList.add("active");
  tabs[i].frame.classList.add("active");
}

/* ENTER */
urlInput.addEventListener("keydown",e=>{
  if(e.key==="Enter") openTab();
});

/* start */
openTab();
</script>
</body>
</html>
