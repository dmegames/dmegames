<!DOCTYPE html>
<html>
<head>
  <title>DME Browser</title>

  <style>
    :root {
      --bg:#202124;
      --top:#303134;
      --tab:#303134;
      --tab-active:#5f6368;
      --text:white;
      --tile:#303134;
    }

    body { margin:0; font-family:Arial; background:var(--bg); color:var(--text); }

    #topbar {
      display:flex;
      padding:5px;
      background:var(--top);
      gap:5px;
    }

    input {
      flex:1;
      padding:8px;
      border:none;
      outline:none;
      border-radius:20px;
    }

    button {
      padding:8px;
      border:none;
      background:var(--tab);
      color:var(--text);
      cursor:pointer;
      border-radius:6px;
    }

    #tabs {
      display:flex;
      background:var(--bg);
      overflow-x:auto;
    }

    .tab {
      padding:6px 10px;
      background:var(--tab);
      margin-right:2px;
      cursor:pointer;
      display:flex;
      gap:6px;
      align-items:center;
    }

    .tab.active { background:var(--tab-active); }

    .close { color:red; cursor:pointer; }

    iframe {
      width:100%;
      height:85vh;
      border:none;
      display:none;
      background:white;
    }

    iframe.active { display:block; }

    .tile {
      background:var(--tile);
      padding:15px;
      border-radius:12px;
      cursor:pointer;
      text-align:center;
    }

    .tile img {
      width:24px;
      height:24px;
      display:block;
      margin:0 auto 5px;
    }
  </style>
</head>
<body>

<div id="topbar">
  <button onclick="goBack()">←</button>
  <button onclick="goForward()">→</button>
  <button onclick="reloadTab()">⟳</button>
  <input id="urlInput" placeholder="Search DME or enter URL">
  <button onclick="openTab()">Go</button>
  <button onclick="addTile()">➕</button>
  <button onclick="cycleTheme()">🎨</button>
</div>

<div id="tabs"></div>
<div id="frames"></div>

<script>
let tabs = [];
let current = -1;

// 🎨 THEMES (5)
const themes = [
  {name:"Dark", bg:"#202124", top:"#303134", tab:"#303134", active:"#5f6368", text:"white", tile:"#303134"},
  {name:"Light", bg:"#ffffff", top:"#e0e0e0", tab:"#d0d0d0", active:"#b0b0b0", text:"black", tile:"#f0f0f0"},
  {name:"Ocean", bg:"#0b1d3a", top:"#102a54", tab:"#102a54", active:"#1e4fa1", text:"white", tile:"#123061"},
  {name:"Sunset", bg:"#3a0b1d", top:"#5a102a", tab:"#5a102a", active:"#a11e4f", text:"white", tile:"#611234"},
  {name:"Neon", bg:"#000000", top:"#111111", tab:"#111111", active:"#00ffcc", text:"#00ffcc", tile:"#0a0a0a"}
];

let themeIndex = localStorage.getItem("theme") || 0;

function applyTheme(){
  let t = themes[themeIndex];
  document.documentElement.style.setProperty("--bg", t.bg);
  document.documentElement.style.setProperty("--top", t.top);
  document.documentElement.style.setProperty("--tab", t.tab);
  document.documentElement.style.setProperty("--tab-active", t.active);
  document.documentElement.style.setProperty("--text", t.text);
  document.documentElement.style.setProperty("--tile", t.tile);

  localStorage.setItem("theme", themeIndex);
}

function cycleTheme(){
  themeIndex++;
  if(themeIndex >= themes.length) themeIndex = 0;
  applyTheme();
}

applyTheme();

// 🧠 DEFAULT TILES
const defaultTiles = [
  {name:"Games", url:"https://selenium-chemistry.gtec.ar"},
  {name:"Launcher", url:"https://learning.elpsicologo.com.ar"}
];

function getTiles(){
  let saved = localStorage.getItem("tiles");
  if(saved) return JSON.parse(saved);
  localStorage.setItem("tiles", JSON.stringify(defaultTiles));
  return defaultTiles;
}

function saveTiles(t){ localStorage.setItem("tiles", JSON.stringify(t)); }

// 🏠 HOMEPAGE
function createHomePage(){
  let tiles = getTiles();

  return `
  <html>
  <body style="margin:0;font-family:Arial;background:${getComputedStyle(document.body).backgroundColor};color:${getComputedStyle(document.body).color};text-align:center;">
    
    <h1 style="margin-top:40px;">DME</h1>

    <input 
      placeholder="Search..." 
      style="padding:10px;border-radius:20px;border:none;width:60%;"
      onkeydown="if(event.key==='Enter'){parent.openTab(this.value)}"
    >

    <div style="margin-top:40px; display:grid; grid-template-columns:repeat(auto-fit,120px); gap:20px; justify-content:center;">
      ${tiles.map(t=>tile(t.name,t.url)).join("")}
    </div>
  </body>
  </html>
  `;
}

function tile(name,url){
  let icon = "https://www.google.com/s2/favicons?domain=" + url;

  return `
    <div class="tile" onclick="parent.openTab('${url}')">
      <img src="${icon}">
      ${name}
    </div>
  `;
}

// ➕ ADD TILE
function addTile(){
  let name = prompt("Site name:");
  let url = prompt("Site URL:");
  if(!name || !url) return;

  let tiles = getTiles();
  tiles.push({name,url});
  saveTiles(tiles);

  reloadHome();
}

function reloadHome(){
  if(current >= 0){
    tabs[current].frame.srcdoc = createHomePage();
  }
}

// 🔍 SEARCH
function isUrl(text){ return text.includes(".") && !text.includes(" "); }

async function createSearchPage(q){
  return `
  <html>
  <body style="font-family:Arial;background:#202124;color:white;text-align:center;padding-top:50px;">
    <h1>DME Search</h1>
    <h2>${q}</h2>
    <button onclick="window.open('https://www.bing.com/search?q=${encodeURIComponent(q)}','_blank')">
      Open results
    </button>
  </body>
  </html>
  `;
}

// 🧩 TABS
function setActive(i){
  current = i;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll("iframe").forEach(f=>f.classList.remove("active"));

  tabs[i].tab.classList.add("active");
  tabs[i].frame.classList.add("active");

  urlInput.value = tabs[i].url;
}

function openTab(input){
  let raw = input || urlInput.value;

  const tab = document.createElement("div");
  tab.className="tab";

  const title = document.createElement("span");
  title.textContent = raw || "New Tab";

  const close = document.createElement("span");
  close.textContent="✕";
  close.className="close";

  tab.append(title,close);

  const frame = document.createElement("iframe");

  if(!raw){
    frame.srcdoc = createHomePage();
  }
  else if(!isUrl(raw)){
    createSearchPage(raw).then(html => frame.srcdoc = html);
  }
  else{
    let url = raw.startsWith("http") ? raw : "https://" + raw;
    frame.src = url;
  }

  document.getElementById("tabs").appendChild(tab);
  document.getElementById("frames").appendChild(frame);

  const obj = {tab,frame,url:raw};
  tabs.push(obj);

  tab.onclick=()=>setActive(tabs.indexOf(obj));

  close.onclick=(e)=>{
    e.stopPropagation();
    const i=tabs.indexOf(obj);
    tab.remove();
    frame.remove();
    tabs.splice(i,1);
    if(tabs.length) setActive(0);
  };

  setActive(tabs.indexOf(obj));
}

// start homepage
openTab();

// nav
function goBack(){ try{tabs[current].frame.contentWindow.history.back();}catch{} }
function goForward(){ try{tabs[current].frame.contentWindow.history.forward();}catch{} }
function reloadTab(){ try{tabs[current].frame.src = tabs[current].frame.src;}catch{} }

urlInput.addEventListener("keydown",e=>{
  if(e.key==="Enter") openTab();
});
</script>

</body>
</html>
